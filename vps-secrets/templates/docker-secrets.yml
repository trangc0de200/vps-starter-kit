# ===========================================
# Management Commands
# ===========================================
# Create all secrets from files:
#   for f in secrets/*.txt; do
#     name=$(basename "$f" .txt)
#     docker secret create "$name" "$f"
#   done

# List all secrets:
#   docker secret ls

# Inspect secret:
#   docker secret inspect db_password

# Remove secret:
#   docker secret rm db_password

# Remove all secrets:
#   docker secret ls --format '{{.Name}}' | xargs -r docker secret rm
