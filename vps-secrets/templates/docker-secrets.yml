# Docker Secrets Template

# ===========================================
# Docker Secrets Configuration
# ===================================
# Usage:
# 1. Copy to docker-secrets.yml
# 2. Edit with your secret names
# 3. Run: docker secret create $(cat secret.txt)
# ===========================================

version: '3.8'

# ===========================================
# Database Secrets
# ===========================================
# Create:
#   echo "password" | docker secret create db_password -
secrets:
  db_password:
    file: secrets/db_password.txt
  
  db_username:
    file: secrets/db_username.txt
  
  db_root_password:
    file: secrets/db_root_password.txt

# ===========================================
# Application Secrets
# ===========================================
# Create:
#   ./scripts/generate_secret.sh -l 64 -t jwt > secrets/app_jwt_secret.txt
#   docker secret create app_jwt_secret secrets/app_jwt_secret.txt
secrets:
  app_jwt_secret:
    external: true
  
  app_secret_key:
    external: true
  
  app_encryption_key:
    external: true

# ===========================================
# External Service Keys
# ===========================================
# Create API key files:
#   ./scripts/generate_secret.sh -l 40 -t key > secrets/aws_access_key.txt
#   docker secret create aws_access_key secrets/aws_access_key.txt
secrets:
  aws_access_key:
    file: secrets/aws_access_key.txt
  
  aws_secret_key:
    file: secrets/aws_secret_key.txt
  
  stripe_api_key:
    file: secrets/stripe_api_key.txt
  
  sendgrid_api_key:
    file: secrets/sendgrid_api_key.txt

# ===========================================
# SSL Certificates
# ===========================================
# Copy certs:
#   cp /etc/letsencrypt/live/example.com/fullchain.pem secrets/ssl_cert.pem
#   cp /etc/letsencrypt/live/example.com/privkey.pem secrets/ssl_key.pem
#   docker secret create ssl_cert secrets/ssl_cert.pem
#   docker secret create ssl_key secrets/ssl_key.pem
secrets:
  ssl_cert:
    file: secrets/ssl_cert.pem
  
  ssl_key:
    file: secrets/ssl_key.pem

