apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vps-system

resources:
  - base/namespace.yaml
  - base/configmap.yaml
  - base/secret.yaml
  - base/storageclass.yaml
  - base/pvc.yaml
  - databases/postgres/deployment.yaml
  - databases/mysql/deployment.yaml
  - databases/redis/deployment.yaml
  - networking/ingress.yaml
  - networking/network-policy.yaml
  - monitoring/prometheus.yaml
  - monitoring/grafana.yaml

commonLabels:
  app.kubernetes.io/part-of: vps-starter-kit
  app.kubernetes.io/managed-by: kustomize
  version: v1.0.0

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: vps-starter-kit
