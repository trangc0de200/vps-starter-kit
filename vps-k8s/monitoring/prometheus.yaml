apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus
  namespace: monitoring
spec:
  serviceAccountName: prometheus
  serviceMonitorSelector:
    matchLabels:
      team: platform
  ruleSelector:
    matchLabels:
      role: alert-rules
  resources:
    requests:
      memory: 400Mi
    limits:
      memory: 2Gi
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: standard-hdd
        resources:
          requests:
            storage: 50Gi
  alerting:
    alertmanagers:
      - namespace: monitoring
        name: alertmanager-main
        port: web
---
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: alertmanager-main
  namespace: monitoring
spec:
  replicas: 3
  configSecret: alertmanager-config
  resources:
    requests:
      memory: 100Mi
    limits:
      memory: 256Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@example.com'
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: critical
        - match:
            severity: warning
          receiver: warning
    receivers:
      - name: 'default'
        slack_configs:
          - channel: '#alerts'
            api_url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'
      - name: 'critical'
        slack_configs:
          - channel: '#alerts-critical'
        pagerduty_configs:
          - routing_key: 'PAGERDUTY_KEY'
      - name: 'warning'
        slack_configs:
          - channel: '#alerts-warning'
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-monitor
  namespace: monitoring
  labels:
    team: platform
spec:
  selector:
    matchLabels:
      app: postgres
  endpoints:
    - port: postgres
      interval: 30s
    - port: metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-monitor
  namespace: monitoring
  labels:
    team: platform
spec:
  selector:
    matchLabels:
      app: redis
  endpoints:
    - port: redis
      interval: 30s
