apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: databases
type: Opaque
stringData:
  postgres-password: "CHANGE_ME_postgres_password"
  postgres-replication-password: "CHANGE_ME_replication_password"
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: databases
type: Opaque
stringData:
  mysql-root-password: "CHANGE_ME_mysql_root_password"
  mysql-password: "CHANGE_ME_mysql_password"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: databases
type: Opaque
stringData:
  redis-password: "CHANGE_ME_redis_password"
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-secret
  namespace: vps-system
type: Opaque
stringData:
  aws-access-key-id: "CHANGE_ME_AWS_KEY"
  aws-secret-access-key: "CHANGE_ME_AWS_SECRET"
  encryption-password: "CHANGE_ME_ENCRYPTION_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: networking
type: kubernetes.io/tls
stringData:
  # Generate with: openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
  # Then: kubectl create secret tls tls-secret --cert=cert.pem --key=key.pem -n networking
  tls.crt: "BASE64_ENCODED_CERT"
  tls.key: "BASE64_ENCODED_KEY"
