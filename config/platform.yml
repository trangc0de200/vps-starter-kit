platform:
  name: vps-starter-kit
  version: 7.0.0
  root: /opt/vps
  timezone: UTC

networks:
  proxy: proxy_network
  database: db_network

defaults:
  deploy_user: deployer
  install_npm: true
  auto_start_npm: true
  enable_ufw: true
  enable_fail2ban: true

projects:
  - name: example-app
    path: /opt/vps/vps-app/my-app
    environment: production

plugins:
  - minio
  - kafka
  - elasticsearch
