platform:
  name: vps-starter-kit
  version: 8.1.0
  root: /opt/vps
  timezone: UTC

networks:
  proxy: proxy_network
  database: db_network

defaults:
  deploy_user: deployer
  install_npm: true
  auto_start_npm: true
  enable_ufw: true
  enable_fail2ban: true

projects:
  - name: example-app
    path: /opt/vps/vps-app/my-app
    environment: production
    alerts_enabled: false

services:
  - name: nginx-proxy-manager
    path: /opt/vps/vps-infra/nginx-proxy-manager
  - name: postgres
    path: /opt/vps/vps-db/postgres
  - name: mysql
    path: /opt/vps/vps-db/mysql
  - name: redis
    path: /opt/vps/vps-db/redis
  - name: sqlserver
    path: /opt/vps/vps-db/sqlserver

plugins:
  - minio
  - kafka
  - elasticsearch

alerting:
  slack_enabled: false
  telegram_enabled: false
  default_channel: ops

secrets:
  strategy: env_files
  encryption: none
