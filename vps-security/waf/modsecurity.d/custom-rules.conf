# ModSecurity Custom Rules
# This file contains custom WAF rules beyond OWASP CRS

# ===========================================
# IP WHITELIST
# ===========================================
# Add trusted IPs that bypass WAF rules
# SecRule REMOTE_ADDR "@ipMatchFromFile /etc/modsecurity.d/custom/whitelist.txt" \
#     "id:1000,phase:1,pass,nolog,ctl:ruleEngine=Off"

# ===========================================
# IP BLACKLIST
# ===========================================
# Block known malicious IPs
# SecRule REMOTE_ADDR "@ipMatchFromFile /etc/modsecurity.d/custom/blacklist.txt" \
#     "id:1001,phase:1,deny,log,msg:'IP blocked'"

# ===========================================
# BLOCK SPECIFIC USER AGENTS
# ===========================================
SecRule REQUEST_HEADERS:User-Agent "@rx (curl|wget|python|requests|httpclient|scrapy|bot|spider|crawler)" \
    "id:1002,phase:1,deny,log,msg:'Blocked User Agent'"

# ===========================================
# BLOCK SPECIFIC PATHS
# ===========================================
# Block access to sensitive paths
SecRule REQUEST_URI "@rx /(wp-admin|wp-login|administrator|admin-console|phpmyadmin|.env|.git/|config\.php)" \
    "id:1003,phase:1,deny,log,msg:'Access to sensitive path blocked'"

# ===========================================
# REQUEST SIZE LIMITS
# ===========================================
# Limit request body size to prevent DoS
SecRule REQUEST_BODY_LENGTH "@gt 10485760" \
    "id:1004,phase:2,deny,log,msg:'Request body too large'"

# Limit file upload size
SecRule FILES_TOTAL_SIZE "@gt 10485760" \
    "id:1005,phase:2,deny,log,msg:'Total uploaded file size too large'"

# ===========================================
# BLOCK SUSPICIOUS URL PATTERNS
# ===========================================
SecRule REQUEST_URI "@rx (\.\./|\.\.\%2f|%2e%2e/|\\x00|%0a|%0d)" \
    "id:1006,phase:1,deny,log,msg:'Directory traversal attempt'"

SecRule REQUEST_URI "@rx (<script|javascript:|onerror=|onclick=|onload=)" \
    "id:1007,phase:1,deny,log,msg:'XSS attempt in URL'"

SecRule REQUEST_URI "@rx (union\s+select|union\s+all\s+select|' or '1'='1|--|\/\*|\*\/)" \
    "id:1008,phase:1,deny,log,msg:'SQL injection attempt in URL'"

# ===========================================
# ARGUMENT VALIDATION
# ===========================================
# Check arguments for common attack patterns
SecRule ARGS "@rx (\<script|javascript:|onerror=|onclick=|onload=|alert\()" \
    "id:1009,phase:2,deny,log,msg:'XSS attempt in arguments'"

SecRule ARGS "@rx (union\s+select|insert\s+into|delete\s+from|drop\s+table|exec\(|execute\()" \
    "id:1010,phase:2,deny,log,msg:'SQL injection attempt in arguments'"

SecRule ARGS "@rx (\$\{.*\}|\$\{.*:.*\}|%7B%7B.*%7D%7D)" \
    "id:1011,phase:2,deny,log,msg:'Server Side Template Injection attempt'"

# ===========================================
# PROTECT SENSITIVE ENDPOINTS
# ===========================================
# Rate limit login attempts
SecRule REQUEST_URI "@rx /api/(login|auth|signin)" \
    "id:1012,phase:1,pass,log,tctl:trackRobin(key:/api/auth/remote_addr)"

# Block after 5 failed login attempts (tracked externally)
# SecRule &IP:LOGIN_FAIL "@eq 5" \
#     "id:1013,phase:1,deny,log,msg:'Too many login attempts'"

# ===========================================
# PROTECTION HEADERS
# ===========================================
# Force secure cookies
SecRule RESPONSE_HEADERS:Set-Cookie "@rx (.*)" \
    "id:1014,phase:3,pass,log,setvar:session.cookie_secure=true"

SecRule RESPONSE_HEADERS:Set-Cookie "@rx (.*)" \
    "id:1015,phase:3,pass,log,setvar:session.cookie_httponly=true"

SecRule RESPONSE_HEADERS:Set-Cookie "@rx (.*)" \
    "id:1016,phase:3,pass,log,setvar:session.cookie_samesite=Strict"

# ===========================================
# CUSTOM BLOCKING PAGE
# ===========================================
# Error handling
SecDefaultAction "phase:2,log,auditlog,deny,status:403"

# ===========================================
# LOGGING CONFIGURATION
# ===========================================
# Increase log level for suspicious requests
SecRule REQUEST_HEADERS:User-Agent "@rx (sqlmap|nikto|nessus|nmap|masscan)" \
    "id:1017,phase:1,pass,log,msg:'Security scanner detected'"
