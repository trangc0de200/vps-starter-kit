version: '3.8'

services:
  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: waf
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - BACKEND=http://app:3000
      - SERVER_NAME=yourdomain.com
      - MODSECURITY_MODE=DetectionOnly
      - ERRORLOG=/var/log/nginx/error.log
      - ACCESSLOG=/var/log/nginx/access.log
      - PASSLOG=/var/log/nginx/pass_status.log
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./modsecurity.d:/etc/modsecurity.d/custom:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx
    networks:
      - proxy_network
    depends_on:
      - app
    profiles:
      - production

  app:
    image: your-app-image:latest
    container_name: app
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - proxy_network
    profiles:
      - production

networks:
  proxy_network:
    external: true

volumes:
  ssl:
    driver: local
