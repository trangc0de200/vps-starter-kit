# Logrotate Configuration for WAF Logs
# Add to /etc/logrotate.d/waf on host machine

/var/lib/vps-starter-kit/vps-security/waf/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 nginx adm
    sharedscripts
    postrotate
        docker exec waf nginx -s reload 2>/dev/null || true
    endscript
}

/var/lib/vps-starter-kit/vps-security/waf/logs/modsecurity/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 root adm
}
