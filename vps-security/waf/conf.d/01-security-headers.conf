# Security Headers Configuration

# ===========================================
# HTTP STRICT TRANSPORT SECURITY (HSTS)
# ===========================================
# Force HTTPS for 1 year (31536000 seconds)
# Include subdomains and preload for browsers
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ===========================================
# CONTENT SECURITY POLICY (CSP)
# ===========================================
# Basic CSP - customize based on your app needs
# 'self' allows same origin
# 'unsafe-inline' needed for some legacy apps - remove if possible
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

# ===========================================
# REFERRER POLICY
# ===========================================
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ===========================================
# PERMISSIONS POLICY
# ===========================================
# Control browser features
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(self), usb=()" always;

# ===========================================
# X-FRAME-OPTIONS
# ===========================================
# Prevent clickjacking - only allow same origin
add_header X-Frame-Options "SAMEORIGIN" always;

# ===========================================
# X-CONTENT-TYPE-OPTIONS
# ===========================================
# Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# ===========================================
# X-XSS-PROTECTION
# ===========================================
# Legacy XSS filter (modern browsers use CSP)
add_header X-XSS-Protection "1; mode=block" always;

# ===========================================
# CROSS-ORIGIN POLICIES
# ===========================================
# Control cross-origin resource sharing
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# ===========================================
# CACHE CONTROL (for sensitive pages)
# ===========================================
