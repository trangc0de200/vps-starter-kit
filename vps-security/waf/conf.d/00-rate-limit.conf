# Rate Limiting Configuration
# This file contains rate limiting rules for different endpoints

# ===========================================
# ZONE DEFINITIONS (in nginx.conf)
# ===========================================
# limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# limit_req_zone $server_name zone=server_limit:100m rate=1000r/s;

# ===========================================
# CONNECTION LIMITING
# ===========================================
# limit_conn_zone $binary_remote_addr zone=addr:10m;

# ===========================================
# ENDPOINT RATE LIMITS
# ===========================================

# Global rate limit - apply to all requests
# 100 requests per second with burst of 200
limit_req zone=general burst=200 nodelay;

# API endpoints - stricter limit
# 30 requests per second with burst of 50
location /api/ {
    limit_req zone=api burst=50 nodelay;
    limit_req_status 429;
}

# Authentication endpoints - very strict
# 5 requests per minute (brute force protection)
location ~ ^/(login|signin|auth) {
    limit_req zone=login burst=10 nodelay;
    limit_req_status 429;
}

# File uploads - no burst, strict limit
location ~ ^/(upload|api/upload) {
    limit_req zone=api burst=5 nodelay;
    client_max_body_size 10M;
}

# Static files - relaxed limit
location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
    limit_req zone=general burst=500 nodelay;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# Health check endpoints - no limit
location ~ ^/(health|ping|status)$ {
    limit_req zone=general burst=1 nodelay;
    access_log off;
}

# ===========================================
# RESPONSE STATUS CODES
# ===========================================
# 429: Too Many Requests
# 503: Service Unavailable (when server is overloaded)
