version: '3.8'

services:
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIME_KUMA_VERSION:-1.23.15}
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/overview", "-O", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - monitoring_network

volumes:
  uptime_kuma_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UPTIME_KUMA_DATA_PATH:-./data}

networks:
  monitoring_network:
    name: ${NETWORK_NAME:-monitoring_network}
    external: true
