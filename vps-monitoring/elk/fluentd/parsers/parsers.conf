# Fluentd Parsers Configuration

<parser>
  @type multi_format
  <pattern>
    format json
    time_format %Y-%m-%dT%H:%M:%S.%L%z
  </pattern>
  <pattern>
    format /^(?<time>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})\s+\[(?<severity>\w+)\]\s+(?<message>.+)$/
    time_format %Y-%m-%d %H:%M:%S
  </pattern>
  <pattern>
    format /^(?<message>.+)$/
  </pattern>
</parser>

<parser>
  @type json
  time_type float
  time_format %iso8601
</parser>

<parser>
  @type regexp
  expression ^(?<host>[^ ]*) [^ ]* (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referrer>[^\"]*)" "(?<agent>[^\"]*)")?$
  time_format %d/%b/%Y:%H:%M:%S %z
  types code:integer,size:integer
</parser>
