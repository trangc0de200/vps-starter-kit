# Fluentd Configuration
# Log collection daemon for ELK Stack

<source>
  @type prometheus
  port 24231
  metrics_path /metrics
</source>

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type http
  port 9880
  body_size_limit 32MB
  keepalive_timeout 10s
</source>

<source>
  @type tail
  @id input-docker-containers
  path /var/lib/docker/containers/*/*.log
  pos_file /var/log/fluentd/docker-containers.log.pos
  tag docker.*
  read_from_head true
  <parse>
    @type json
    time_type float
    time_format %iso8601
  </parse>
</source>

<filter docker.**>
  @type record_transformer
  enable_ruby true
  <record>
    hostname "#{Socket.gethostname}"
    tag ${tag}
    timestamp ${time.strftime('%Y-%m-%dT%H:%M:%S%z')}
  </record>
</filter>

<filter docker.*>
  @type parser
  key_name log
  reserve_data true
  suppress_parse_error_log true
  <parse>
    @type multi_format
    <pattern>
      format json
      time_format %Y-%m-%dT%H:%M:%S.%L%z
    </pattern>
    <pattern>
      format /^(?<message>.+)$/
    </pattern>
  </parse>
</filter>

<filter docker.var.lib.docker.containers.**>
  @type geoip
  geoip_lookup_key host
  <record>
    geoip_city ${city.names.en["default"]}
    geoip_country ${country.names.en["default"]}
    geoip_location ${location.latitude},${location.longitude}
  </record>
  <parse>
    @type json
  </parse>
</filter>

<filter docker.**>
  @type prometheus
  <metric>
    name docker_log_entries_total
    type counter
    desc Total number of log entries
    <labels>
      container ${record["container_name"]}
    </labels>
  </metric>
</filter>

<match docker.**>
  @type elasticsearch
  @id elasticsearch-docker
  log_level info
  include_tag_key true
  host elasticsearch
  port 9200
  user elastic
  password changeme
  scheme http
  index_name fluentd-docker-${record["hostname"]}-%Y%m%d
  type_name _doc
  logstash_format true
  logstash_prefix docker
  logstash_dateformat %Y.%m.%d
  time_key_format %Y-%m-%dT%H:%M:%S.%L%z
  time_key time
  <buffer>
    @type file
    path /var/log/fluentd/buffer/docker
    size_chunk_limit 8KB
    queue_limit_length 256
    flush_interval 5s
    retry_max_interval 300
    retry_type exponential_backoff
  </buffer>
</match>

