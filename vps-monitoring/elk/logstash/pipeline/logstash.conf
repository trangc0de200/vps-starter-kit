# Logstash Pipeline Configuration
# Process and transform logs before indexing to Elasticsearch

input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [log][entry] {
    json {
      source => "log.entry"
      target => "parsed_log"
    }
  }

  if [message] =~ /^\d{4}-\d{2}-\d{2}/ {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp}\s*\[%{LOGLEVEL:severity}\]\s*%{GREEDYDATA:log_message}" 
      }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  if [container_name] {
    mutate {
      add_field => { 
        "service" => "%{container_name}" 
        "environment" => "docker"
      }
    }
  }

  if [type] == "nginx" {
    grok {
      match => { 
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status:int} %{NUMBER:bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}" %{NUMBER:request_time:float}'
      }
    }
    
    geoip {
      source => "client_ip"
      target => "geoip"
    }
    
    useragent {
      source => "user_agent"
      target => "ua"
    }
    
    mutate {
      convert => {
        "status" => "integer"
        "bytes" => "integer"
        "request_time" => "float"
      }
    }
  }

  if [type] == "application" or [service] =~ /app/ {
    mutate {
      add_tag => [ "application" ]
    }
    
    if [level] {
      mutate {
        lowercase => [ "level" ]
        add_field => { "severity" => "%{level}" }
      }
    }
    
    if [error] {
      mutate {
        add_tag => [ "error" ]
      }
    }
  }

  mutate {
    remove_field => [ "host" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
    manage_template => false
    index => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
  }
  
  if "error" in [tags] {
    stdout {
      codec => rubydebug
    }
  }
}
