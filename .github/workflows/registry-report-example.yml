name: Registry Report Example
on:
  workflow_dispatch:
jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - name: Run registry report
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            /opt/vps/vps-platform/scripts/registry_report.sh
