[databases]
; Database connection string
; Format: dbname = host=... port=... dbname=... user=... password=...
* = host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME}

[pgbouncer]
; Connection settings
listen_addr = *
listen_port = 5432
; Unix socket for admin console
admin_users = ${PGBOUNCER_ADMIN_USER}
stats_users = ${PGBOUNCER_STATS_USER}

; Pool mode: session, transaction, statement
pool_mode = ${PGBOUNCER_POOL_MODE}

; Maximum number of client connections
max_client_conn = ${PGBOUNCER_MAX_CLIENT_CONN}

; Default pool size per database/user combination
default_pool_size = ${PGBOUNCER_DEFAULT_POOL_SIZE}

; Minimum connections to keep in pool
min_pool_size = ${PGBOUNCER_MIN_POOL_SIZE}

; Reserve additional connections for peak load
reserve_pool_size = ${PGBOUNCER_RESERVE_POOL_SIZE}

; Timeout for reserved connections (seconds)
reserve_pool_timeout = ${PGBOUNCER_RESERVE_POOL_TIMEOUT}

; Maximum database connections across all pools
max_db_connections = ${PGBOUNCER_MAX_DB_CONNECTIONS}

; Server lifetime in seconds (0 = disabled)
server_lifetime = ${PGBOUNCER_SERVER_LIFETIME}

; Server idle timeout (seconds)
server_idle_timeout = ${PGBOUNCER_IDLE_TIMEOUT}

; Authentication
auth_type = ${PGBOUNCER_AUTH_TYPE}
auth_file = /etc/pgbouncer/userlist.txt
; Use PostgreSQL for auth instead
; auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; Logging
log_connections = ${PGBOUNCER_LOG_CONNECTIONS}
log_disconnections = ${PGBOUNCER_LOG_DISCONNECTIONS}
log_errors = ${PGBOUNCER_LOG_ERRORS}

; Query timeout (seconds)
query_timeout = ${PGBOUNCER_QUERY_TIMEOUT}

; Client login timeout (seconds)
client_login_timeout = ${PGBOUNCER_CLIENT_LOGIN_TIMEOUT}

; Reset query after release
server_reset_query = DISCARD ALL

; Server check delay (seconds)
server_check_delay = 30

; DNS lookup cache time (seconds)
dns_nx_ttl = 15
dns_zone_part_size = 10000

; Use descriptor reuse
reuse_reserved_connections = on

; Application name for PostgreSQL
application_name_features = on
