# VPS Database Stack - Full Deployment

version: '3.8'

services:
  # ===========================================
  # PostgreSQL
  # ===========================================
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    restart: unless-stopped
    env_file:
      - path: postgres/.env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_VERSION:-v0.15.0}
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appdb}?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db_network
    profiles:
      - monitoring

  # ===========================================
  # MySQL
  # ===========================================
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: ${MYSQL_CONTAINER_NAME:-mysql}
    restart: unless-stopped
    env_file:
      - path: mysql/.env
        required: false
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-mysql}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db_network

  mysql-exporter:
    image: prom/mysqld-exporter:${MYSQL_EXPORTER_VERSION:-v0.15.0}
    container_name: mysql-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "root:${MYSQL_ROOT_PASSWORD}@(mysql:3306)/"
    ports:
      - "${MYSQL_EXPORTER_PORT:-9104}:9104"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - db_network
    profiles:
      - monitoring

  # ===========================================
  # Redis
  # ===========================================
  redis:
    image: redis:${REDIS_VERSION:-7.2-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    restart: unless-stopped
    env_file:
      - path: redis/.env
        required: false
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly yes
      --save "900 1 300 10 60 10000"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./redis/backups:/backups
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db_network

  redis-exporter:
    image: oliver006/redis_exporter:${REDIS_EXPORTER_VERSION:-v1.55.0}
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - db_network
    profiles:
      - monitoring

  # ===========================================
  # PgBouncer (Connection Pooling)
  # ===========================================
  pgbouncer:
    image: edoburu/pgbouncer:${PGBOUNCER_VERSION:-latest}
    container_name: pgbouncer
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appdb}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
    ports:
      - "${PGBOUNCER_PORT:-5433}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db_network
    profiles:
      - pooling

  # ===========================================
  # ProxySQL (Connection Pooling)
  # ===========================================
  proxysql:
    image: proxysql/proxysql:${PROXYSQL_VERSION:-2.6.3}
    container_name: proxysql
    restart: unless-stopped
    ports:
      - "${PROXYSQL_PORT:-6033}:6033"
      - "${PROXYSQL_ADMIN_PORT:-6032}:6032"
    volumes:
      - ./proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - db_network
    profiles:
      - pooling

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  db_network:
    name: ${NETWORK_NAME:-db_network}
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET:-172.28.0.0/16}
