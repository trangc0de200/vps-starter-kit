version: '3.8'

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wireguard
    restart: unless-stopped
    environment:
      - WG_HOST=${WG_HOST}
      - WG_PORT=${WG_PORT:-51820}
      - WG_MTU=${WG_MTU:-1420}
      - WG_NETWORK=${WG_NETWORK:-10.0.0}
      - WG_SUBNET=${WG_SUBNET:-24}
      - WG_ADDRESS=${WG_ADDRESS:-10.0.0.1/24}
      - WG_DNS=${WG_DNS:-1.1.1.1,1.0.0.1}
      - WG_ALLOWED=${WG_ALLOWED:-0.0.0.0/0,::/0}
      - WG_PERSISTENT_KEEPALIVE=${WG_PERSISTENT_KEEPALIVE:-25}
      - WG_PRE_UP=echo "Pre up"
      - WG_POST_UP=iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
      - WG_POST_DOWN=iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
      - WEBUI_PORT=${WEBUI_PORT:-51821}
      - WEBUI_PASSWORD=${WEBUI_PASSWORD}
      - PASSWORD_HASH=  # Optional: bcrypt hash of WEBUI_PASSWORD
      - WG_DEFAULT_ADDRESS=${WG_NETWORK}.2
      - WG_ALLOWED_IPS=${WG_ALLOWED:-0.0.0.0/0,::/0}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host
    volumes:
      - ./config:/app/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WEBUI_PORT:-51821}:51821/tcp"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  default:
    name: vpn_network
    driver: bridge
